<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rock Known - Lista de Bandas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; min-height: 100vh; }
        .navbar { background-color: #cc0000 !important; margin-top: 30px; border-radius: 15px; }
        .logo-square { width: 65px; height: 65px; object-fit: cover; border: 2px solid white; }
        
        .page-animation {
            animation: transformIn 0.8s ease-out both;
        }
        @keyframes transformIn {
            0% { transform: translateY(50px) rotateX(-10deg); opacity: 0; }
            100% { transform: translateY(0) rotateX(0); opacity: 1; }
        }

        .card-band {
            background: #111;
            border: 1px solid #cc0000;
            transition: 0.4s;
            overflow: hidden;
            height: 100%;
        }
        .card-band:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(204, 0, 0, 0.4);
        }
        .band-img { height: 220px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="container pb-5">
        <nav class="navbar navbar-expand-lg navbar-dark px-3 mb-5 shadow">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="Rock Known.html">
                    <img src="https://piotrrozalskigraphicsdesign.wordpress.com/wp-content/uploads/2015/09/rock-logo-1.jpg" alt="Logo" class="logo-square me-3">
                    <span class="fw-bold">ROCK KNOWN</span>
                </a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="Rock Known.html">HOME</a></li>
                        <li class="nav-item"><a class="nav-link active" href="Lista de Bandas.html">LISTA DE BANDAS</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="page-animation">
            <h2 class="display-5 fw-bold mb-5 border-start border-danger border-5 ps-3">GALERÍA DE BANDAS</h2>
            
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card card-band text-white">
                        <img src="https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=400" class="band-img" alt="Måneskin">
                        <div class="card-body text-center"><h4 class="fw-bold">Måneskin</h4></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-band text-white">
                        <img src="https://images.unsplash.com/photo-1511735111819-9a3f7709049c?q=80&w=400" class="band-img" alt="AC/DC">
                        <div class="card-body text-center"><h4 class="fw-bold">AC/DC</h4></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-band text-white">
                        <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=400" class="band-img" alt="Three Days Grace">
                        <div class="card-body text-center"><h4 class="fw-bold">Three Days Grace</h4></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-band text-white">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=400" class="band-img" alt="Linkin Park">
                        <div class="card-body text-center"><h4 class="fw-bold">Linkin Park</h4></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-band text-white">
                        <img src="https://images.unsplash.com/photo-1514525253361-b9300b46a09b?q=80&w=400" class="band-img" alt="Avenged Sevenfold">
                        <div class="card-body text-center"><h4 class="fw-bold">Avenged Sevenfold</h4></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-band text-white">
                        <img src="https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=400" class="band-img" alt="Evanescence">
                        <div class="card-body text-center"><h4 class="fw-bold">Evanescence</h4></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
