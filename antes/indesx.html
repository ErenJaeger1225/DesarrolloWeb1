      <form>
      <!-- Título del formulario -->
      <h3>Formulario</h3>

        <!-- ==================== CAMPO NOMBRE ==================== -->
        <!-- label: crea una etiqueta que describe el campo. El "for" se conecta con el id del input -->
        <label for="nombre"> Nombre </label>
        
        <!-- Input para el nombre -->
        <!-- type="text"     → permite escribir texto -->
        <!-- id="nombre"     → identificador único del campo -->
        <!-- name="nombre"   → nombre que se usará si se envían los datos -->
        <!-- placeholder     → texto de ejemplo que aparece dentro del campo -->
        <!-- pattern         → valida que solo se escriban letras y espacios (no números) -->
        <!-- title           → mensaje que aparece si el usuario escribe algo incorrecto -->
        <!-- required        → obliga al usuario a llenar este campo -->
        <input type="text" 
               id="nombre" 
               name="nombre"
               placeholder="Ingresa tu nombre"
               pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" 
               title="Solo se permiten letras y espacios"
               required>
        <br><br>

        <!-- ==================== CAMPO EDAD (como date) ==================== -->
        <!-- label para el campo de edad -->
        <label for="edad"> Edad </label>
        
        <!-- Input tipo date: muestra un selector de fecha -->
        <!-- type="date"     → permite seleccionar una fecha (día/mes/año) -->
        <!-- id y name       → identificador y nombre del campo -->
        <!-- required        → campo obligatorio -->
        <input type="date" 
               id="edad" 
               name="edad"
               required>
        <br><br>

        <!-- ==================== CAMPO EMAIL ==================== -->
        <label for="email"> email </label>
        
        <!-- type="email"    → valida automáticamente que tenga formato de correo (con @ y .) -->
        <!-- id y name       → como en los campos anteriores -->
        <!-- placeholder     → texto de ayuda -->
        <!-- required        → obligatorio -->
        <input type="email" 
               id="email" 
               name="email"
               pattern="^[a-zA-Z0-9._%+-]+@(gmail|hotmail|yahoo)\.com$"
               placeholder="ejemplo@correo.com"
               required>
        <br><br>

        <!-- ==================== CAMPO CELULAR ==================== -->
        <label for="celular"> numero de celular </label>
        
        <!-- type="tel"      → recomendado para números de teléfono -->
        <!-- maxlength="10"  → no permite escribir más de 10 caracteres -->
        <!-- pattern="[0-9]{10}" → obliga a que sean exactamente 10 números -->
        <!-- title           → mensaje de error si no cumple los 10 dígitos -->
        <!-- required        → obligatorio -->
        <input type="tel" 
               id="celular" 
               name="celular"
               placeholder="0987654321"
               maxlength="10"
               pattern="[0-9]{10}"
               title="Debe tener exactamente 10 dígitos"
               required>
        <br><br>

        <!-- ==================== CAMPO DESCRIPCIÓN ==================== -->
        <!-- label para la descripción -->
        <label for="descripcion"> Descripción </label>
        <br>
        <!-- textarea        → campo más grande para escribir texto en varias líneas -->
        <!-- id y name       → identificador y nombre -->
        <!-- rows="4"        → muestra 4 líneas de altura por defecto -->
        <!-- placeholder     → texto de ejemplo -->
        <textarea id="descripcion" 
                  name="descripcion"
                  rows="7" 
                  placeholder="Escribe algo aquí..."></textarea>
        <br><br>

        <!-- ==================== BOTÓN DE ENVIAR ==================== -->
        <!-- type="submit"   → indica que es el botón para enviar el formulario -->
        <!-- Al hacer clic, el navegador verificará automáticamente los campos "required" y "pattern" -->
        <!-- Si todo está correcto, el formulario se enviará (la página se recargará) -->
        <button type="submit">
            Enviar
        </button>
        
        
    </form>
