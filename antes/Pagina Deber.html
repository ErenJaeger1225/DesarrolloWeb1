<!doctype html>
<!-- Declara que este documento es un archivo HTML5 -->

<html lang="es">
<!-- Indica que el idioma principal de la página es español -->

<head>
    <!-- Sección head: contiene información sobre la página (no se ve en la pantalla) -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres para poder usar letras como ñ, á, é, í, etc. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive (se adapte bien a celulares y tablets) -->

    <title>My Music</title>
    <!-- Título que aparece en la pestaña del navegador -->

    <link rel="stylesheet" href="estilos.css">
    <!-- Enlaza el archivo CSS externo llamado "estilos.css" para aplicar los estilos -->

</head>
<!-- Cierre de la sección head -->

<body>
    <!-- Cuerpo de la página: aquí va todo lo que el usuario ve -->

    <!-- Barra de navegación horizontal -->
    <nav class="navbar">
        <!-- Contenedor principal del navbar -->

        <!-- Logo o nombre de la página -->
        <div class="logo">My Music</div>
        <!-- Muestra el texto "My Music" en la parte izquierda del navbar -->

        <!-- Lista de enlaces del menú -->
        <ul class="nav-links">
            <!-- Contenedor de la lista de enlaces (ul = unordered list) -->

            <!-- Enlace a la página de Inicio -->
            <li><a href="Pagina Deber.html">Inicio</a></li>
            <!-- Crea un elemento de lista que lleva a la página principal -->

            <!-- Enlace a la página de Bandas -->
            <li><a href="bandas.html">Bandas</a></li>
            <!-- Redirige a la página "bandas.html" cuando se hace clic -->

            <!-- Enlace a Spotify -->
            <li><a href="https://www.spotify.com/es/" target="_blank" rel="noopener">Spotify</a></li>
            <!-- Abre la página oficial de Spotify en una nueva pestaña -->

        </ul>
        <!-- Cierre de la lista de enlaces -->

    </nav>
    <!-- Cierre del navbar -->

    <!-- Título principal de bienvenida -->
    <h1>Bienvenido a My Music</h1>
    <!-- Muestra un título grande en la página de inicio -->
     <img src="https://lastfm.freetls.fastly.net/i/u/ar0/849c3f70b914d9707446a39ec07da82d.jpg">

</body>
<!-- Cierre del cuerpo de la página -->

</html>
<!-- Cierre completo del documento HTML -->
