<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel</title>
    <link rel="stylesheet" href="carrucel.css">
</head>
<body>

    <div class="carousel">                                      <!-- Contenedor principal -->
        <div class="carousel-container">                        <!-- Contenedor que se mueve -->
            
            <div class="slide">                                 <!-- Slide 1 -->
                <img src="https://cdn.wallpapersafari.com/73/91/xb4zrI.jpg" alt="Imagen 1">
            </div>
            
            <div class="slide">                                 <!-- Slide 2 -->
                <img src="https://images7.alphacoders.com/542/thumb-1920-542373.png" alt="Imagen 2">
            </div>
            
            <div class="slide">                                 <!-- Slide 3 -->
                <img src="https://cdn.wallpapersafari.com/34/64/UN2vkB.jpg" alt="Imagen 3">
            </div>

        </div>

        <button class="prev-btn">&lt;</button>                 <!-- Botón anterior -->
        <button class="next-btn">&gt;</button>                 <!-- Botón siguiente -->

    </div>

    <script src="carrucel.js"></script>
</body>
</html>
